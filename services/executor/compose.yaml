services:
  executor:
    build:
      context: .
      args:
        EXECUTOR_VERSION: ${EXECUTOR_VERSION:-latest}
    container_name: executor
    image: ${EXECUTOR_IMAGE:-ghcr.io/shekohex/executor-proxy:latest}
    ports:
      - "${EXECUTOR_HTTP_PORT:-4788}:80"
    env_file:
      - ../../.env
    environment:
      EXECUTOR_PORT: ${EXECUTOR_PORT:-4788}
      EXECUTOR_DATA_DIR: /var/lib/executor
      EXECUTOR_SCOPE_DIR: /workspace
    volumes:
      - ../../data/executor/data:/var/lib/executor
      - ../../config/executor/config:/workspace
    restart: unless-stopped
    networks:
      - ai-gateway-connect
    extra_hosts:
      - "host.docker.internal:host-gateway"
